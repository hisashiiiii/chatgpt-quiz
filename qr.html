<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT クイズ QRコード</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    h1 { font-size: 1.5rem; color: #1a1a2e; margin-bottom: 6px; }
    p  { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
    #qr { margin: 0 auto 24px; }
    .url {
      font-size: 0.8rem;
      color: #6c63ff;
      word-break: break-all;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🤖 ChatGPT クイズ</h1>
  <p>スマホでスキャンして遊ぼう！</p>
  <canvas id="qr"></canvas>
  <div class="url">https://hisashiiiii.github.io/chatgpt-quiz/</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  new QRCode(document.getElementById('qr'), {
    text: 'https://hisashiiiii.github.io/chatgpt-quiz/',
    width: 220,
    height: 220,
    colorDark: '#1a1a2e',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
</script>
</body>
</html>
