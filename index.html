<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT クイズ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    /* ---- Start ---- */
    #start { text-align: center; }
    #start h1 { font-size: 2rem; color: #1a1a2e; margin-bottom: 12px; }
    #start p { color: #666; margin-bottom: 32px; line-height: 1.6; }

    /* ---- Quiz ---- */
    #quiz { display: none; }

    .step {
      font-size: 0.8rem;
      font-weight: bold;
      color: #888;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .q-text {
      font-size: 1.25rem;
      font-weight: bold;
      color: #1a1a2e;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .choices { display: flex; flex-direction: column; gap: 12px; }

    .btn {
      border: 2px solid #ddd;
      border-radius: 12px;
      background: #fafafa;
      padding: 14px 18px;
      font-size: 1rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.18s;
      color: #222;
    }
    .btn:hover:not(:disabled) { border-color: #6c63ff; background: #f0eeff; }
    .btn:disabled { cursor: default; }
    .btn.correct { background: #e6f9ef; border-color: #27ae60; color: #1a6e3a; font-weight: bold; }
    .btn.wrong   { background: #fdecea; border-color: #e74c3c; color: #922b21; }

    .feedback {
      margin-top: 20px;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.6;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.ok  { background: #e6f9ef; color: #1a6e3a; border-left: 4px solid #27ae60; }
    .feedback.ng  { background: #fdecea; color: #922b21; border-left: 4px solid #e74c3c; }

    .next-btn {
      margin-top: 22px;
      width: 100%;
      padding: 14px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      display: none;
      transition: opacity 0.2s;
    }
    .next-btn:hover { opacity: 0.85; }
    .next-btn.show { display: block; }

    /* ---- Result ---- */
    #result { display: none; text-align: center; }
    .r-icon { font-size: 4rem; margin-bottom: 12px; }
    .r-title { font-size: 1.6rem; font-weight: bold; color: #1a1a2e; margin-bottom: 8px; }
    .r-score {
      font-size: 3rem;
      font-weight: bold;
      color: #6c63ff;
      margin: 16px 0;
    }
    .r-msg { color: #555; margin-bottom: 28px; line-height: 1.6; }

    .score-dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 12px 0 24px;
    }
    .dot {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: bold;
    }
    .dot.ok { background: #e6f9ef; color: #27ae60; }
    .dot.ng { background: #fdecea; color: #e74c3c; }

    /* shared btn style */
    .primary-btn {
      display: inline-block;
      padding: 13px 40px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .primary-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
<div class="card">

  <!-- スタート画面 -->
  <div id="start">
    <h1>🤖 ChatGPT クイズ</h1>
    <p>ChatGPTについての3択クイズ！<br>全5問に挑戦してみよう。</p>
    <button class="primary-btn" onclick="startQuiz()">スタート！</button>
  </div>

  <!-- クイズ画面 -->
  <div id="quiz">
    <div class="step" id="step"></div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="next()"></button>
  </div>

  <!-- 結果画面 -->
  <div id="result">
    <div class="r-icon" id="r-icon"></div>
    <div class="r-title">クイズ終了！</div>
    <div class="score-dots" id="score-dots"></div>
    <div class="r-score" id="r-score"></div>
    <div class="r-msg" id="r-msg"></div>
    <button class="primary-btn" onclick="restart()">もう一度</button>
  </div>

</div>

<script>
const Qs = [
  {
    q: "ChatGPTを開発した企業はどれ？",
    choices: ["Google", "OpenAI", "Microsoft"],
    ans: 1,
    exp: "ChatGPTはOpenAIが開発。2022年11月の公開から5日でユーザー100万人を突破しました。"
  },
  {
    q: "ChatGPTの「GPT」は何の略？",
    choices: ["General Purpose Technology", "Generative Pre-trained Transformer", "Global Processing Tool"],
    ans: 1,
    exp: "Generative Pre-trained Transformer（生成的事前学習済みトランスフォーマー）の略です。"
  },
  {
    q: "ChatGPTが正しくない情報を自信満々に話す現象を何という？",
    choices: ["デジタルバグ", "オーバーロード", "ハルシネーション（幻覚）"],
    ans: 2,
    exp: "ハルシネーション（幻覚）といいます。意図的な嘘ではなく、確率的な生成の副作用で起こります。"
  },
  {
    q: "ChatGPTを使うとき、AIの役割や口調をあらかじめ設定する仕組みは？",
    choices: ["システムプロンプト", "ファインチューニング", "プラグイン"],
    ans: 0,
    exp: "システムプロンプトで「あなたは〇〇の専門家です」のようにAIの振る舞いを事前に設定できます。"
  },
  {
    q: "ChatGPTの応答品質向上に使われた学習手法は？",
    choices: ["GAN（敵対的生成ネットワーク）", "RLHF（人間のフィードバックによる強化学習）", "CNN（畳み込みニューラルネット）"],
    ans: 1,
    exp: "RLHF（Reinforcement Learning from Human Feedback）：人間がAI回答を評価し、そのフィードバックで学習する手法です。"
  }
];

let idx = 0, score = 0, results = [];

function startQuiz() {
  idx = 0; score = 0; results = [];
  show('quiz');
  render();
}

function render() {
  const q = Qs[idx];
  document.getElementById('step').textContent = `問題 ${idx + 1} / ${Qs.length}`;
  document.getElementById('q-text').textContent = q.q;

  const c = document.getElementById('choices');
  c.innerHTML = '';
  q.choices.forEach((ch, i) => {
    const b = document.createElement('button');
    b.className = 'btn';
    b.textContent = `${['A','B','C'][i]}. ${ch}`;
    b.onclick = () => answer(i);
    c.appendChild(b);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('next-btn').className = 'next-btn';
}

function playPinpon() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  // ベル音を鳴らす（倍音を重ねて鐘らしい音色にする）
  function bell(fund, startTime, duration, vol) {
    [1, 2, 3, 4.2, 5.4].forEach((mult, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = fund * mult;
      const v = vol / Math.pow(i + 1, 1.3);
      gain.gain.setValueAtTime(v, startTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
      osc.start(startTime);
      osc.stop(startTime + duration + 0.05);
    });
  }

  const now = ctx.currentTime;
  bell(1047, now,        0.5, 0.35);  // ピン（C6）
  bell(784,  now + 0.32, 1.4, 0.45);  // ポーン（G5・長めの余韻）
}

function playBuboo() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const now = ctx.currentTime;
  [[180, 0, 0.38], [150, 0.4, 0.5]].forEach(([freq, when, dur]) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.35, now + when);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + when + dur);
    osc.start(now + when);
    osc.stop(now + when + dur + 0.05);
  });
}

function answer(sel) {
  const q = Qs[idx];
  const ok = sel === q.ans;
  if (ok) { score++; playPinpon(); } else { playBuboo(); }
  results.push(ok);

  document.querySelectorAll('.btn').forEach((b, i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add('correct');
    else if (i === sel) b.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (ok ? 'ok' : 'ng');
  fb.innerHTML = (ok ? '⭕ 正解！　' : '❌ 不正解…　') + q.exp;

  const nb = document.getElementById('next-btn');
  nb.classList.add('show');
  nb.textContent = idx + 1 < Qs.length ? '次へ →' : '結果を見る';
}

function next() {
  idx++;
  if (idx < Qs.length) { render(); }
  else { showResult(); }
}

function showResult() {
  show('result');
  const total = Qs.length;
  const pct = Math.round(score / total * 100);

  // dots
  const dots = document.getElementById('score-dots');
  dots.innerHTML = results.map(ok =>
    `<div class="dot ${ok ? 'ok' : 'ng'}">${ok ? '⭕' : '❌'}</div>`
  ).join('');

  document.getElementById('r-score').textContent = `${score} / ${total} 点`;

  let icon, msg;
  if (score === total)       { icon='🏆'; msg='全問正解！ChatGPT博士ですね！'; }
  else if (score >= 4)       { icon='🎉'; msg='あと1問！かなりの知識をお持ちです。'; }
  else if (score >= 3)       { icon='👍'; msg='なかなかの結果！復習してもう一度挑戦を。'; }
  else                       { icon='📚'; msg='解説を読んで、ぜひ再挑戦してみてください！'; }

  document.getElementById('r-icon').textContent = icon;
  document.getElementById('r-msg').textContent = msg;
}

function restart() { startQuiz(); }

function show(id) {
  ['start','quiz','result'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}
</script>
</body>
</html>
